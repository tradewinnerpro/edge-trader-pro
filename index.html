<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Winner Pro - Teste Conexão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: monospace;
            background: #05080f;
            color: #dde4f5;
            padding: 20px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .ok {
            background: rgba(61,255,160,.2);
            border: 1px solid #3dffa0;
            color: #3dffa0;
        }
        .error {
            background: rgba(255,94,107,.2);
            border: 1px solid #ff5e6b;
            color: #ff5e6b;
        }
        button {
            background: #ffb946;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        pre {
            background: #0b1020;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🏆 Trade Winner Pro - Teste de Conexão</h1>
    
    <div id="status">🟡 Testando conexão...</div>
    
    <button onclick="testSetups()">📋 Testar Tabela setups</button>
    <button onclick="testTrades()">📊 Testar Tabela trades</button>
    <button onclick="testCapital()">💰 Testar Tabela capital</button>
    <button onclick="inserirSetupTeste()">➕ Inserir Setup Teste</button>
    
    <h3>📝 Resultado:</h3>
    <pre id="resultado">Aguardando teste...</pre>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://omgcjhvhezcikfjyfonw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_06GuHSVCvqZ7OlwgXJdtfw_RwM5d663';
        
        console.log('🔑 Conectando com:', SUPABASE_URL);
        console.log('🔑 Key:', SUPABASE_KEY.substring(0, 20) + '...');
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Atualizar status
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('resultado');
        
        async function testSetups() {
            resultDiv.innerHTML = '🟡 Buscando dados da tabela setups...';
            try {
                const { data, error, status } = await sb.from('setups').select('*');
                
                if (error) {
                    resultDiv.innerHTML = `❌ ERRO:\n${JSON.stringify(error, null, 2)}`;
                    statusDiv.innerHTML = '🔴 Erro na tabela setups';
                    statusDiv.className = 'status error';
                } else {
                    resultDiv.innerHTML = `✅ SUCESSO!\n\n📊 Registros encontrados: ${data?.length || 0}\n\n📋 Dados:\n${JSON.stringify(data, null, 2)}`;
                    statusDiv.innerHTML = '🟢 Tabela setups OK';
                    statusDiv.className = 'status ok';
                }
            } catch (e) {
                resultDiv.innerHTML = `❌ EXCEÇÃO:\n${e.message}`;
                statusDiv.innerHTML = '🔴 Exceção';
                statusDiv.className = 'status error';
            }
        }
        
        async function testTrades() {
            resultDiv.innerHTML = '🟡 Buscando dados da tabela trades...';
            try {
                const { data, error } = await sb.from('trades').select('*').limit(5);
                
                if (error) {
                    resultDiv.innerHTML = `❌ ERRO:\n${JSON.stringify(error, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `✅ SUCESSO!\n\n📊 Últimos 5 trades:\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (e) {
                resultDiv.innerHTML = `❌ EXCEÇÃO:\n${e.message}`;
            }
        }
        
        async function testCapital() {
            resultDiv.innerHTML = '🟡 Buscando dados da tabela capital...';
            try {
                const { data, error } = await sb.from('capital').select('*');
                
                if (error) {
                    resultDiv.innerHTML = `❌ ERRO:\n${JSON.stringify(error, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `✅ SUCESSO!\n\n💰 Capital:\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (e) {
                resultDiv.innerHTML = `❌ EXCEÇÃO:\n${e.message}`;
            }
        }
        
        async function inserirSetupTeste() {
            resultDiv.innerHTML = '🟡 Inserindo setup de teste...';
            try {
                const novoSetup = {
                    nome: 'Setup Teste ' + new Date().toLocaleTimeString(),
                    descricao: 'Setup criado para testar conexão',
                    score: 3
                };
                
                const { data, error } = await sb.from('setups').insert([novoSetup]).select();
                
                if (error) {
                    resultDiv.innerHTML = `❌ ERRO ao inserir:\n${JSON.stringify(error, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `✅ SETUP INSERIDO COM SUCESSO!\n\n📋 Dados inseridos:\n${JSON.stringify(data, null, 2)}`;
                    // Recarregar setups após inserir
                    setTimeout(() => testSetups(), 1000);
                }
            } catch (e) {
                resultDiv.innerHTML = `❌ EXCEÇÃO:\n${e.message}`;
            }
        }
        
        // Teste automático ao carregar
        setTimeout(() => {
            testSetups();
        }, 500);
    </script>
</body>
</html>
