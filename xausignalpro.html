<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TESTE - Conexão</title>
<style>
body { background: #05080f; color: white; font-family: Arial; padding: 50px; text-align: center; }
button { 
    padding: 20px 40px; 
    font-size: 20px; 
    background: #3dffa0; 
    color: black; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    margin: 10px;
}
.status { 
    padding: 20px; 
    margin: 20px; 
    border-radius: 10px; 
    font-size: 18px;
}
.online { background: #0a3d20; color: #3dffa0; border: 2px solid #3dffa0; }
.offline { background: #3d0a0a; color: #ff5e6b; border: 2px solid #ff5e6b; }
</style>
</head>
<body>

<h1>🔌 TESTE DE CONEXÃO SIMPLES</h1>

<div id="statusBox" class="status offline">
    ⚫ DESCONECTADO
</div>

<div id="info" style="margin: 20px; font-size: 16px;">
    Clique no botão CONECTAR para testar
</div>

<button onclick="conectar()" style="background: #3dffa0;">
    ✅ CONECTAR
</button>

<button onclick="desconectar()" style="background: #ff5e6b;">
    ❌ DESCONECTAR
</button>

<div id="contador" style="margin-top: 30px; font-size: 24px; color: #ffb946;"></div>

<script>
var conectado = false;
var timer = null;
var segundos = 0;

function conectar() {
    if (conectado) {
        alert('Já está conectado!');
        return;
    }
    
    conectado = true;
    document.getElementById('statusBox').className = 'status online';
    document.getElementById('statusBox').innerHTML = '🟢 CONECTADO - FUNCIONANDO!';
    document.getElementById('info').innerHTML = '✅ Sistema online! Atualizando a cada 5 segundos...';
    
    segundos = 0;
    atualizarContador();
    
    timer = setInterval(function() {
        segundos++;
        atualizarContador();
        document.getElementById('info').innerHTML = 
            '🔄 Atualização #' + segundos + '<br>' +
            '📊 Dados simulados gerados com sucesso!<br>' +
            '💰 Preço atual: $' + (2650 + Math.random() * 20).toFixed(2);
    }, 5000);
}

function desconectar() {
    if (!conectado) {
        alert('Já está desconectado!');
        return;
    }
    
    conectado = false;
    clearInterval(timer);
    timer = null;
    
    document.getElementById('statusBox').className = 'status offline';
    document.getElementById('statusBox').innerHTML = '⚫ DESCONECTADO';
    document.getElementById('info').innerHTML = 'Sistema parado. Total de atualizações: ' + segundos;
    document.getElementById('contador').innerHTML = '';
}

function atualizarContador() {
    document.getElementById('contador').innerHTML = 
        '⏱️ Tempo conectado: ' + segundos + ' segundos';
}
</script>

</body>
</html>
