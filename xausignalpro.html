<script>
"use strict";
(function(){

const MAX_CANDLES=100, UPDATE_MS=60000;
const ATR_PERIOD=10, UT_MULT=1.0;

let candles=[], connected=false, timer=null, cdTimer=null, cdSecs=60;
let signalLog=[], lastSignalType=null, dataSource='';

// ============ CORREÇÃO PRINCIPAL: Função fetchYahoo melhorada ============
async function fetchYahoo(sym) {
  // Usa uma URL de proxy mais confiável
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=5m&range=5d&includePrePost=false`;
  
  // Tenta múltiplos proxies em ordem
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(yUrl)}`,
    `https://cors-anywhere.herokuapp.com/${yUrl}`
  ];
  
  let lastError = null;
  
  for (const proxyUrl of proxies) {
    try {
      console.log(`Tentando proxy: ${proxyUrl}`);
      
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      
      const response = await fetch(proxyUrl, {
        signal: controller.signal,
        headers: {
          'Accept': 'application/json',
          'User-Agent': 'Mozilla/5.0'
        }
      });
      
      clearTimeout(timeoutId);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} - ${response.statusText}`);
      }
      
      const data = await response.json();
      
      // Verifica estrutura da resposta
      if (!data || !data.chart || !data.chart.result || !data.chart.result[0]) {
        throw new Error('Estrutura de dados inválida para ' + sym);
      }
      
      const result = data.chart.result[0];
      const quotes = result.indicators.quote[0];
      const timestamps = result.timestamp;
      
      if (!timestamps || !quotes || !quotes.open) {
        throw new Error('Dados incompletos para ' + sym);
      }
      
      const processedData = [];
      for (let i = 0; i < timestamps.length; i++) {
        if (quotes.open[i] === null || quotes.high[i] === null || 
            quotes.low[i] === null || quotes.close[i] === null) {
          continue;
        }
        
        processedData.push({
          ts: timestamps[i] * 1000,
          open: quotes.open[i],
          high: quotes.high[i],
          low: quotes.low[i],
          close: quotes.close[i],
          vol: quotes.volume ? (quotes.volume[i] || 0) : 0
        });
      }
      
      if (processedData.length < 20) {
        throw new Error(`Poucos candles para ${sym}: ${processedData.length}`);
      }
      
      console.log(`Sucesso com ${sym}: ${processedData.length} candles via proxy`);
      return processedData;
      
    } catch (error) {
      console.warn(`Proxy falhou para ${sym}:`, error.message);
      lastError = error;
      continue;
    }
  }
  
  throw lastError || new Error(`Todas as tentativas falharam para ${sym}`);
}

// ============ Funções de cálculo (mantidas iguais) ============
function ema(data, p) {
  if (!data.length) return [];
  const k = 2 / (p + 1);
  let out = [data[0]];
  for (let i = 1; i < data.length; i++) {
    out.push(data[i] * k + out[i - 1] * (1 - k));
  }
  return out;
}

function rsi(closes, p = 14) {
  if (closes.length < p + 1) return new Array(closes.length).fill(null);
  
  const gains = [];
  const losses = [];
  
  for (let i = 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    gains.push(Math.max(diff, 0));
    losses.push(Math.max(-diff, 0));
  }
  
  let avgGain = 0, avgLoss = 0;
  for (let i = 0; i < p; i++) {
    avgGain += gains[i];
    avgLoss += losses[i];
  }
  avgGain /= p;
  avgLoss /= p;
  
  const rsiValues = new Array(p).fill(null);
  rsiValues.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
  
  for (let i = p; i < gains.length; i++) {
    avgGain = (avgGain * (p - 1) + gains[i]) / p;
    avgLoss = (avgLoss * (p - 1) + losses[i]) / p;
    rsiValues.push(avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss)));
  }
  
  return rsiValues;
}

function macdCalc(closes) {
  const e12 = ema(closes, 12);
  const e26 = ema(closes, 26);
  
  const line = e12.map((v, i) => (v && e26[i]) ? v - e26[i] : null);
  const valid = line.filter(v => v !== null);
  const sig = ema(valid, 9);
  
  const offset = line.length - valid.length;
  const sigAligned = new Array(offset + valid.length - sig.length).fill(null).concat(sig);
  
  const hist = line.map((v, i) => 
    v !== null && sigAligned[i] !== null ? v - sigAligned[i] : null
  );
  
  return { line, signal: sigAligned, hist };
}

function atrCalc(c, p = 10) {
  const tr = [0];
  for (let i = 1; i < c.length; i++) {
    const h = c[i].high;
    const l = c[i].low;
    const pc = c[i - 1].close;
    tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
  }
  
  const atr = [tr[0]];
  for (let i = 1; i < tr.length; i++) {
    atr.push((atr[i - 1] * (p - 1) + tr[i]) / p);
  }
  return atr;
}

function utBot(c, p = 10, mult = 1.0) {
  const atrArr = atrCalc(c, p);
  const lStop = [c[0].close - atrArr[0] * mult];
  const sStop = [c[0].close + atrArr[0] * mult];
  const buyIdx = [];
  const sellIdx = [];
  
  for (let i = 1; i < c.length; i++) {
    const cl = c[i].close;
    const a = atrArr[i] * mult;
    
    const newLS = cl - a;
    lStop[i] = cl > lStop[i - 1] ? Math.max(lStop[i - 1], newLS) : newLS;
    
    const newSS = cl + a;
    sStop[i] = cl < sStop[i - 1] ? Math.min(sStop[i - 1], newSS) : newSS;
    
    if (c[i - 1].close < lStop[i - 1] && cl > lStop[i]) buyIdx.push(i);
    if (c[i - 1].close > sStop[i - 1] && cl < sStop[i]) sellIdx.push(i);
  }
  
  return { lStop, sStop, buyIdx, sellIdx, atrArr };
}

function stoch(c, kP = 14, sP = 3) {
  const kArr = [];
  for (let i = 0; i < c.length; i++) {
    if (i < kP - 1) { kArr.push(null); continue; }
    const sl = c.slice(i - kP + 1, i + 1);
    const h = Math.max(...sl.map(x => x.high));
    const l = Math.min(...sl.map(x => x.low));
    kArr.push(h === l ? 50 : ((c[i].close - l) / (h - l)) * 100);
  }
  
  const dArr = [];
  for (let i = 0; i < kArr.length; i++) {
    if (kArr[i] === null || i < kP - 1 + sP - 1) { dArr.push(null); continue; }
    const slice = kArr.slice(i - sP + 1, i + 1).filter(v => v !== null);
    dArr.push(slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null);
  }
  
  return { k: kArr, d: dArr };
}

function calcSignal(c) {
  if (!c || c.length < 40) return null;
  
  const closes = c.map(x => x.close);
  const n = c.length - 1;
  
  const rsiArr = rsi(closes, 14);
  const e32 = ema(closes, 32);
  const e176 = ema(closes, 176);
  const macd = macdCalc(closes);
  const ut = utBot(c, ATR_PERIOD, UT_MULT);
  const stochData = stoch(c, 14, 3);
  
  const rsiV = rsiArr[n];
  const e32v = e32[n];
  const e176v = e176[n];
  const macdH = macd.hist[n];
  const macdHp = macd.hist[n - 1];
  const lStop = ut.lStop[n];
  const sStop = ut.sStop[n];
  const price = closes[n];
  const atrVal = ut.atrArr[n];
  const stochK = stochData.k[n];
  const stochD = stochData.d[n];
  
  let score = 0;
  const reasons = [];
  
  // RSI
  if (rsiV !== null) {
    if (rsiV < 30) { score += 2; reasons.push({ t: `RSI oversold (${rsiV.toFixed(1)})`, c: 'buy' }); }
    else if (rsiV > 70) { score -= 2; reasons.push({ t: `RSI overbought (${rsiV.toFixed(1)})`, c: 'sell' }); }
    else if (rsiV < 42) { score += 1; reasons.push({ t: `RSI low zone (${rsiV.toFixed(1)})`, c: 'buy' }); }
    else if (rsiV > 58) { score -= 1; reasons.push({ t: `RSI high zone (${rsiV.toFixed(1)})`, c: 'sell' }); }
    else { reasons.push({ t: `RSI neutral (${rsiV.toFixed(1)})`, c: 'neutral' }); }
  }
  
  // UT Bot
  if (ut.buyIdx.includes(n)) { score += 3; reasons.push({ t: 'UT Bot: CROSSED long stop UP', c: 'buy' }); }
  else if (ut.sellIdx.includes(n)) { score -= 3; reasons.push({ t: 'UT Bot: CROSSED short stop DOWN', c: 'sell' }); }
  else if (price > lStop) { score += 1; reasons.push({ t: 'Price above long stop', c: 'buy' }); }
  else { score -= 1; reasons.push({ t: 'Price below long stop', c: 'sell' }); }
  
  // EMA
  if (e32v && e176v) {
    if (e32v > e176v) { score += 1; reasons.push({ t: 'EMA32 > EMA176 (uptrend)', c: 'buy' }); }
    else { score -= 1; reasons.push({ t: 'EMA32 < EMA176 (downtrend)', c: 'sell' }); }
  }
  
  // MACD
  if (macdH !== null && macdHp !== null) {
    if (macdH > 0 && macdHp <= 0) { score += 2; reasons.push({ t: 'MACD crossed UP', c: 'buy' }); }
    else if (macdH < 0 && macdHp >= 0) { score -= 2; reasons.push({ t: 'MACD crossed DOWN', c: 'sell' }); }
    else if (macdH > 0) { score += 1; reasons.push({ t: 'MACD histogram positive', c: 'buy' }); }
    else { score -= 1; reasons.push({ t: 'MACD histogram negative', c: 'sell' }); }
  }
  
  // Stochastic
  if (stochK !== null && stochD !== null) {
    if (stochK < 20 && stochK > stochD) { score += 1; reasons.push({ t: 'Stoch oversold crossing up', c: 'buy' }); }
    else if (stochK > 80 && stochK < stochD) { score -= 1; reasons.push({ t: 'Stoch overbought crossing down', c: 'sell' }); }
    else if (stochK > stochD && stochK < 50) { score += 0.5; reasons.push({ t: 'Stoch K>D low zone', c: 'buy' }); }
    else if (stochK < stochD && stochK > 50) { score -= 0.5; reasons.push({ t: 'Stoch K<D high zone', c: 'sell' }); }
  }
  
  // Session bonus
  const h = new Date().getUTCHours();
  const sessBonus = (h >= 13 && h < 20) ? 1 : (h >= 7 && h < 13) ? 0.5 : 0;
  const scoreNorm = Math.min(10, (Math.abs(score) + sessBonus) * 1.25);
  
  let tipo, conf;
  if (score >= 4) { tipo = 'BUY'; conf = 65 + Math.min((score - 4) * 8, 27); }
  else if (score <= -4) { tipo = 'SELL'; conf = 65 + Math.min((-score - 4) * 8, 27); }
  else if (score >= 2) { tipo = 'BUY'; conf = 48 + score * 9; }
  else if (score <= -2) { tipo = 'SELL'; conf = 48 + (-score) * 9; }
  else { tipo = 'HOLD'; conf = 35 + Math.abs(score) * 6; }
  conf = Math.min(conf, 93);
  
  const tpDist = atrVal * 2.5;
  const slDist = atrVal * 1.2;
  const tp = tipo === 'BUY' ? price + tpDist : tipo === 'SELL' ? price - tpDist : price;
  const sl = tipo === 'BUY' ? price - slDist : tipo === 'SELL' ? price + slDist : price;
  const rr = slDist > 0 ? tpDist / slDist : 0;
  
  return {
    tipo, conf, score, scoreNorm, price, tp, sl, rr,
    rsiV, e32: e32v, e176: e176v, macdH, macdSig: macd.signal[n],
    lStop, sStop, atrVal, reasons,
    utBuy: ut.buyIdx.includes(n), utSell: ut.sellIdx.includes(n),
    stochK, stochD, e32Arr: e32, e176Arr: e176, macdData: macd, utData: ut
  };
}

function drawChart(c, sig) {
  const canvas = document.getElementById('mainChart');
  if (!canvas) return;
  
  const W = canvas.offsetWidth || 700;
  const H = 320;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  
  const pad = { t: 24, b: 22, l: 8, r: 58 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;
  
  let mn = Infinity, mx = -Infinity;
  for (const candle of c) {
    if (candle.low < mn) mn = candle.low;
    if (candle.high > mx) mx = candle.high;
  }
  mn -= 3;
  mx += 3;
  const rng = mx - mn || 1;
  
  const toX = i => pad.l + (i / (c.length - 1)) * cW;
  const toY = v => pad.t + (1 - (v - mn) / rng) * cH;
  const bw = Math.max(2, cW / c.length * 0.62);
  
  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.fillStyle = 'rgba(90,112,144,.6)';
  for (let i = 0; i <= 5; i++) {
    const y = pad.t + (cH / 5) * i;
    ctx.beginPath();
    ctx.moveTo(pad.l, y);
    ctx.lineTo(pad.l + cW, y);
    ctx.stroke();
    const v = mx - (i / 5) * rng;
    ctx.fillText(v.toFixed(0), pad.l + cW + 4, y + 3);
  }
  
  // UT Bot stops
  if (sig && sig.utData) {
    const stops = [
      [sig.utData.lStop, 'rgba(61,255,160,.35)'],
      [sig.utData.sStop, 'rgba(255,94,107,.35)']
    ];
    for (const [arr, col] of stops) {
      if (!arr || !arr.length) continue;
      ctx.beginPath();
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.2;
      ctx.setLineDash([3, 3]);
      let started = false;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] == null) continue;
        const x = toX(i), y = toY(arr[i]);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  
  // EMAs
  if (sig && sig.e176Arr) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(167,139,250,.7)';
    ctx.lineWidth = 1.5;
    let started = false;
    for (let i = 0; i < sig.e176Arr.length; i++) {
      const v = sig.e176Arr[i];
      if (!v) continue;
      const x = toX(i), y = toY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  
  if (sig && sig.e32Arr) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,140,66,.8)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 2]);
    let started = false;
    for (let i = 0; i < sig.e32Arr.length; i++) {
      const v = sig.e32Arr[i];
      if (!v) continue;
      const x = toX(i), y = toY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // TP/SL lines
  if (sig && sig.tipo !== 'HOLD') {
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(61,255,160,.45)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, toY(sig.tp));
    ctx.lineTo(pad.l + cW, toY(sig.tp));
    ctx.stroke();
    
    ctx.strokeStyle = 'rgba(255,94,107,.45)';
    ctx.beginPath();
    ctx.moveTo(pad.l, toY(sig.sl));
    ctx.lineTo(pad.l + cW, toY(sig.sl));
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Candles
  for (let i = 0; i < c.length; i++) {
    if (i === 0) continue;
    const x = toX(i);
    const up = c[i].close >= c[i].open;
    const col = up ? '#3dffa0' : '#ff5e6b';
    
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, toY(c[i].high));
    ctx.lineTo(x, toY(c[i].low));
    ctx.stroke();
    
    ctx.fillStyle = col;
    const top = toY(Math.max(c[i].open, c[i].close));
    const bot = toY(Math.min(c[i].open, c[i].close));
    ctx.fillRect(x - bw / 2, top, bw, Math.max(1, bot - top));
  }
  
  // UT Bot markers
  if (sig && sig.utData) {
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    for (const idx of sig.utData.buyIdx) {
      ctx.fillStyle = '#3dffa0';
      ctx.fillText('^', toX(idx), toY(c[idx].low) - 14);
    }
    for (const idx of sig.utData.sellIdx) {
      ctx.fillStyle = '#ff5e6b';
      ctx.fillText('v', toX(idx), toY(c[idx].high) + 18);
    }
    ctx.textAlign = 'left';
  }
}

function drawMACD(c, sig) {
  const canvas = document.getElementById('macdChart');
  if (!canvas || !sig) return;
  
  const W = canvas.offsetWidth || 700;
  const H = 64;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  
  const hist = sig.macdData.hist.filter(v => v !== null);
  if (!hist.length) return;
  
  let max = 0;
  for (const v of hist) { const a = Math.abs(v); if (a > max) max = a; }
  if (!max) max = 1;
  
  const mid = H / 2;
  const bw = Math.max(1, W / hist.length * 0.7);
  
  for (let i = 0; i < hist.length; i++) {
    const x = (i / hist.length) * W + bw / 2;
    const h2 = Math.abs(hist[i]) / max * (H / 2 - 4);
    
    ctx.fillStyle = hist[i] >= 0 ? 'rgba(61,255,160,.65)' : 'rgba(255,94,107,.65)';
    if (hist[i] >= 0) ctx.fillRect(x - bw / 2, mid - h2, bw, h2);
    else ctx.fillRect(x - bw / 2, mid, bw, h2);
  }
  
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(W, mid);
  ctx.stroke();
}

function calcMTF(c) {
  function fn(subset) {
    if (!subset || subset.length < 10) return 'WAIT';
    const closes = subset.map(x => x.close);
    const n = subset.length - 1;
    const e32v = ema(closes, Math.min(32, n));
    const e176v = ema(closes, Math.min(176, n));
    const macdD = macdCalc(closes);
    const h = macdD.hist[n];
    const rsiD = rsi(closes, 14);
    const rv = rsiD[n];
    
    let s = 0;
    if (e32v[n] && e176v[n] && e32v[n] > e176v[n]) s++;
    else if (e32v[n] && e176v[n]) s--;
    if (h > 0) s++;
    else if (h < 0) s--;
    if (rv && rv < 40) s++;
    else if (rv && rv > 60) s--;
    
    return s >= 2 ? 'BUY' : s <= -2 ? 'SELL' : 'WAIT';
  }
  
  const n = c.length;
  return {
    m1: fn(c.slice(-20)),
    m5: fn(c.slice(-40)),
    m15: fn(c.slice(-60)),
    h1: fn(c.slice(-80))
  };
}

function updateUI(sig) {
  if (!sig) return;
  
  const fmt = v => v != null ? v.toFixed(2) : '--';
  
  // Price display
  if (candles.length >= 2) {
    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    document.getElementById('priceDisp').textContent = '$' + last.close.toFixed(2);
    const pct = ((last.close - prev.close) / prev.close * 100);
    const chEl = document.getElementById('priceChg');
    chEl.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
    chEl.style.color = pct >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('priceRange').textContent = `H: ${last.high.toFixed(2)} L: ${last.low.toFixed(2)}`;
  }
  
  // Score ring
  const s10 = Math.round(sig.scoreNorm * 10) / 10;
  const circumf = 188.5;
  const offset = circumf - (circumf * (s10 / 10));
  const ringEl = document.getElementById('ringFill');
  ringEl.style.strokeDashoffset = offset;
  const ringColor = s10 >= 7 ? 'var(--green)' : s10 >= 4 ? 'var(--gold)' : 'var(--red)';
  ringEl.style.stroke = ringColor;
  document.getElementById('ringScore').textContent = s10.toFixed(1);
  document.getElementById('ringScore').style.color = ringColor;
  document.getElementById('sysScore').textContent = s10.toFixed(1) + '/10';
  document.getElementById('sysScore').style.color = ringColor;
  
  // Score details
  const top3 = sig.reasons.slice(0, 3);
  document.getElementById('scoreD1').textContent = `Score: ${s10.toFixed(1)}/10 - ${sig.reasons.length} factors`;
  document.getElementById('scoreD2').textContent = top3[0] ? `> ${top3[0].t}` : '--';
  document.getElementById('scoreD3').textContent = top3[1] ? `> ${top3[1].t}` : '--';
  document.getElementById('scoreD2').style.color = 
    top3[0]?.c === 'buy' ? 'var(--green)' : top3[0]?.c === 'sell' ? 'var(--red)' : 'var(--muted)';
  
  // Signal
  const labels = { BUY: 'BUY ^', SELL: 'SELL v', HOLD: 'WAIT' };
  const mainEl = document.getElementById('signalMain');
  mainEl.textContent = labels[sig.tipo];
  mainEl.className = 'sig-main sig-' + sig.tipo.toLowerCase();
  
  // Confidence
  document.getElementById('confPct').textContent = sig.conf.toFixed(0);
  const fill = document.getElementById('confFill');
  fill.style.width = sig.conf + '%';
  fill.className = 'conf-fill fill-' + sig.tipo.toLowerCase();
  
  // Levels
  document.getElementById('lvlEntry').textContent = '$' + fmt(sig.price);
  document.getElementById('lvlTP').textContent = sig.tipo !== 'HOLD' ? '$' + fmt(sig.tp) : '---';
  document.getElementById('lvlSL').textContent = sig.tipo !== 'HOLD' ? '$' + fmt(sig.sl) : '---';
  document.getElementById('rrRatio').textContent = sig.tipo !== 'HOLD' ? '1:' + sig.rr.toFixed(1) : '1:--';
  document.getElementById('atrDisp').textContent = fmt(sig.atrVal);
  document.getElementById('pipRisk').textContent = sig.tipo !== 'HOLD' ? Math.abs(sig.price - sig.sl).toFixed(1) + ' pts' : '--';
  
  // RSI
  const rV = sig.rsiV;
  const rCol = rV < 30 ? 'var(--green)' : rV > 70 ? 'var(--red)' : rV < 42 ? 'var(--gold)' : 'var(--text)';
  document.getElementById('rsiVal').textContent = rV != null ? rV.toFixed(1) : '--';
  document.getElementById('rsiVal').style.color = rCol;
  document.getElementById('rsiLbl').textContent = 
    rV < 30 ? 'OVERSOLD ^' : rV > 70 ? 'OVERBOUGHT v' : rV < 42 ? 'Low zone' : 'Neutral/high';
  document.getElementById('rsiLbl').style.color = rCol;
  document.getElementById('rsiFill').style.width = (rV || 50) + '%';
  document.getElementById('rsiFill').style.background = rCol;
  
  // UT Bot
  const utLbl = sig.utBuy ? '^ CROSSED LONG' : sig.utSell ? 'v CROSSED SHORT' : 'NEUTRAL';
  const utCol = sig.utBuy ? 'var(--green)' : sig.utSell ? 'var(--red)' : 'var(--muted)';
  document.getElementById('utVal').textContent = utLbl;
  document.getElementById('utVal').style.color = utCol;
  document.getElementById('utStop').textContent = 'LongStop: $' + fmt(sig.lStop);
  document.getElementById('utFill').style.width = sig.utBuy ? '100%' : sig.utSell ? '0%' : '50%';
  document.getElementById('utFill').style.background = utCol;
  document.getElementById('utStopLong').textContent = '$' + fmt(sig.lStop);
  document.getElementById('utStopShort').textContent = '$' + fmt(sig.sStop);
  document.getElementById('atrVal').textContent = fmt(sig.atrVal);
  
  // EMA
  const emaUp = sig.e32 > sig.e176;
  document.getElementById('emaVal').textContent = emaUp ? 'GOLDEN CROSS ^' : 'DEATH CROSS v';
  document.getElementById('emaVal').style.color = emaUp ? 'var(--green)' : 'var(--red)';
  document.getElementById('emaSub').textContent = `E32: ${fmt(sig.e32)} E176: ${fmt(sig.e176)}`;
  document.getElementById('emaFill').style.width = emaUp ? '80%' : '20%';
  document.getElementById('emaFill').style.background = emaUp ? 'var(--green)' : 'var(--red)';
  
  // MACD
  const mCol = sig.macdH > 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('macdVal').textContent = fmt(sig.macdH);
  document.getElementById('macdVal').style.color = mCol;
  document.getElementById('macdSub').textContent = 'Signal: ' + (sig.macdSig ? sig.macdSig.toFixed(2) : '--');
  document.getElementById('macdFill').style.width = sig.macdH > 0 ? '75%' : '25%';
  document.getElementById('macdFill').style.background = mCol;
  
  // MTF
  const mtf = calcMTF(candles);
  const mtfMap = {
    BUY: { cls: 'mtf-buy', t: 'BUY ^' },
    SELL: { cls: 'mtf-sell', t: 'SELL v' },
    WAIT: { cls: 'mtf-wait', t: 'WAIT' }
  };
  const tfs = ['M1', 'M5', 'M15', 'H1'];
  const keys = ['m1', 'm5', 'm15', 'h1'];
  for (let ti = 0; ti < tfs.length; ti++) {
    const el = document.getElementById('mtf' + tfs[ti]);
    const info = mtfMap[mtf[keys[ti]]] || mtfMap.WAIT;
    el.textContent = info.t;
    el.className = 'mtf-sig ' + info.cls;
  }
  
  calcMoment(sig);
  addLog(sig);
}

function calcMoment(sig) {
  const h = new Date().getUTCHours();
  let score = 0;
  
  const inNY = h >= 13 && h < 20;
  const inLon = h >= 7 && h < 13;
  const overlap = h >= 13 && h < 16;
  
  if (overlap) { score += 30; document.getElementById('momSess').textContent = 'OVERLAP'; }
  else if (inNY) { score += 25; document.getElementById('momSess').textContent = 'NEW YORK'; }
  else if (inLon) { score += 15; document.getElementById('momSess').textContent = 'LONDON'; }
  else { score += 5; document.getElementById('momSess').textContent = 'ASIA'; }
  
  document.getElementById('momSess').style.color = overlap ? 'var(--green)' : inNY ? 'var(--gold)' : inLon ? 'var(--blue)' : 'var(--muted)';
  
  const utA = sig.utBuy || sig.utSell;
  score += utA ? 30 : 0;
  document.getElementById('momUT').textContent = utA ? 'ACTIVE' : 'None';
  document.getElementById('momUT').style.color = utA ? 'var(--green)' : 'var(--muted)';
  
  const rsiEx = sig.rsiV < 35 || sig.rsiV > 65;
  score += rsiEx ? 20 : 0;
  document.getElementById('momRSI').textContent = rsiEx ? 'EXTREME' : 'Neutral';
  document.getElementById('momRSI').style.color = rsiEx ? 'var(--green)' : 'var(--muted)';
  
  let crossed = false;
  if (sig.macdH !== null && candles.length >= 2) {
    const hPrev = sig.macdData.hist[candles.length - 2];
    crossed = hPrev !== null && Math.sign(sig.macdH) !== Math.sign(hPrev || 0);
  }
  score += crossed ? 20 : 0;
  document.getElementById('momMACD').textContent = crossed ? 'CROSSED' : 'None';
  document.getElementById('momMACD').style.color = crossed ? 'var(--green)' : 'var(--muted)';
  
  score = Math.min(score, 100);
  document.getElementById('momScore').textContent = score + '%';
  document.getElementById('momFill').style.width = score + '%';
  
  const momEl = document.getElementById('momText');
  let col, txt;
  if (score >= 80) { col = 'var(--green)'; txt = 'GREAT MOMENT - Trade now!'; }
  else if (score >= 55) { col = 'var(--gold)'; txt = 'GOOD MOMENT - High attention'; }
  else if (score >= 35) { col = 'var(--orange)'; txt = 'AVERAGE - Wait for confirmation'; }
  else { col = 'var(--red)'; txt = 'OFF SESSION - Do not trade'; }
  
  momEl.textContent = txt;
  momEl.style.color = col;
  momEl.style.borderColor = col;
  document.getElementById('momFill').style.background = col;
  document.getElementById('momScore').style.color = col;
}

function addLog(sig) {
  if (sig.tipo === lastSignalType && !sig.utBuy && !sig.utSell) return;
  lastSignalType = sig.tipo;
  
  const t = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  signalLog.unshift({
    t: t,
    tipo: sig.tipo,
    price: sig.price.toFixed(2),
    conf: sig.conf.toFixed(0),
    why: sig.reasons.length ? sig.reasons[0].t : ''
  });
  
  if (signalLog.length > 15) signalLog.pop();
  
  const el = document.getElementById('signalLog');
  el.innerHTML = signalLog.map(s => {
    const cls = s.tipo === 'BUY' ? 'buy' : s.tipo === 'SELL' ? 'sell' : 'hold';
    const lbl = s.tipo === 'BUY' ? 'BUY' : s.tipo === 'SELL' ? 'SELL' : 'WAIT';
    return `<div class="log-item">
      <span style="color:var(--muted);font-size:9px">${s.t}</span>
      <span class="log-dir log-${cls}">${lbl}</span>
      <span style="color:var(--muted);font-size:9px">$${s.price} ${s.conf}% ${s.why}</span>
    </div>`;
  }).join('');
  
  if ((sig.utBuy || sig.utSell) && sig.tipo !== 'HOLD') {
    dispararAlerta(sig.tipo === 'BUY', sig.price, sig.conf);
  }
}

function updateSessions() {
  const h = new Date().getUTCHours();
  document.getElementById('sessAsia').classList.toggle('active', h >= 0 && h < 7);
  document.getElementById('sessLon').classList.toggle('active', h >= 7 && h < 13);
  document.getElementById('sessNY').classList.toggle('active', h >= 13 && h < 20);
  
  const next = h < 7 ? 'London in ' + (7 - h) + 'h' :
               h < 13 ? 'NY in ' + (13 - h) + 'h' :
               h < 20 ? 'Close in ' + (20 - h) + 'h' :
               'Asia in ' + (24 - h + 7) + 'h';
  document.getElementById('proxSessao').textContent = 'Next transition: ' + next;
  
  const cur = h >= 13 && h < 16 ? 'Overlap London/NY (best period)' :
              h >= 13 && h < 20 ? 'New York' :
              h >= 7 && h < 13 ? 'London' :
              'Asia (low volatility)';
  document.getElementById('sessaoAtual').textContent = 'Current session: ' + cur;
}

// Connection management
window.conectar = async function() {
  if (connected) return;
  connected = true;
  setStatus('loading', 'CONNECTING...');
  
  try {
    await tick();
    if (connected) {
      timer = setInterval(tick, UPDATE_MS);
      startCountdown();
    }
  } catch (error) {
    console.error('Connection error:', error);
    popup('Error', 'Failed to connect: ' + error.message);
  }
};

window.desconectar = function() {
  if (!connected) return;
  connected = false;
  if (timer) { clearInterval(timer); timer = null; }
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  setStatus('off', 'OFFLINE');
  document.getElementById('liveDot').style.background = 'var(--muted)';
  popup('Stopped', 'API paused.');
};

async function tick() {
  if (!connected) return;
  setStatus('loading', 'FETCHING...');
  
  const data = await fetchCandles();
  if (!data) {
    setStatus('off', 'API ERROR');
    popup('Error', 'Failed to fetch data. Retrying in 60s.');
    return;
  }
  
  candles = data;
  document.getElementById('candleCount').textContent = candles.length;
  document.getElementById('lastUpd').textContent = new Date().toLocaleTimeString('pt-BR');
  document.getElementById('liveDot').style.background = 'var(--green)';
  
  const sig = calcSignal(candles);
  if (sig) {
    drawChart(candles, sig);
    drawMACD(candles, sig);
    updateUI(sig);
  }
  
  setStatus('on', 'LIVE');
  cdSecs = 60;
}

function startCountdown() {
  cdSecs = 60;
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdSecs--;
    document.getElementById('countdown').textContent = cdSecs + 's';
    if (cdSecs <= 0) cdSecs = 60;
  }, 1000);
}

function setStatus(type, msg) {
  const el = document.getElementById('statusBadge');
  el.textContent = msg;
  el.className = 'status-badge s-' + type;
}

// Alert system
let alertaAtivo = true;

window.toggleAlerta = function() {
  alertaAtivo = !alertaAtivo;
  const btn = document.getElementById('btnAlerta');
  if (alertaAtivo) {
    btn.innerHTML = '🔔 ALERTA ON';
    btn.className = 'btn-hdr btn-alert-on';
    popup('Alerta LIGADO', 'Voz + visual ativados para sinais.');
  } else {
    btn.innerHTML = '🔕 ALERTA OFF';
    btn.className = 'btn-hdr btn-alert-off';
    popup('Alerta DESLIGADO', 'Notificações desativadas.');
  }
};

let alertTimer = null;

function dispararAlerta(isBuy, price, conf) {
  if (!alertaAtivo) return;
  
  // Voice alert
  try {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance();
      msg.lang = 'pt-BR';
      msg.rate = 0.95;
      msg.pitch = 1.1;
      msg.volume = 1;
      msg.text = isBuy
        ? `Sinal de COMPRA! Ouro. Confiança: ${Math.round(conf)} por cento. Entrada em ${price.toFixed(0)} dólares.`
        : `Sinal de VENDA! Ouro. Confiança: ${Math.round(conf)} por cento. Entrada em ${price.toFixed(0)} dólares.`;
      window.speechSynthesis.speak(msg);
    }
  } catch (e) {
    console.warn('Speech synthesis error:', e);
  }
  
  // Sound beep
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ac = new AudioContext();
    const freqs = isBuy ? [440, 660, 880] : [880, 660, 440];
    freqs.forEach((f, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.3, ac.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.12 + 0.2);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime + i * 0.12);
      osc.stop(ac.currentTime + i * 0.12 + 0.22);
    });
  } catch (e) {
    console.warn('Audio error:', e);
  }
  
  // Visual banner
  const banner = document.getElementById('alertBanner');
  const icon = document.getElementById('alertIcon');
  const text = document.getElementById('alertText');
  const sub = document.getElementById('alertSub');
  
  banner.className = 'alert-banner show ' + (isBuy ? 'alert-buy' : 'alert-sell');
  icon.textContent = isBuy ? '▲' : '▼';
  text.textContent = isBuy ? 'COMPRA — XAU/USD' : 'VENDA — XAU/USD';
  sub.textContent = `$${price.toFixed(2)} · Confiança: ${Math.round(conf)}% · ${new Date().toLocaleTimeString('pt-BR')}`;
  
  if (alertTimer) clearTimeout(alertTimer);
  alertTimer = setTimeout(() => {
    banner.classList.remove('show');
  }, 6000);
}

// Toast popup
let popT;
function popup(title, desc) {
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupDesc').textContent = desc;
  const el = document.getElementById('popup');
  el.classList.add('show');
  if (popT) clearTimeout(popT);
  popT = setTimeout(() => {
    el.classList.remove('show');
  }, 5000);
}

// Initialize
updateSessions();
setInterval(updateSessions, 30000);
popup('Ready', 'Click CONNECT to fetch real XAU/USD data.');

})();
</script>
