<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAU/USD · Signal Intelligence Pro - TESTE</title>
<style>
body {
    background: #05080f;
    color: #dde4f5;
    font-family: 'JetBrains Mono', monospace;
    padding: 20px;
    margin: 0;
}
.test-box {
    background: #0b1020;
    border: 1px solid rgba(255,185,70,.15);
    border-radius: 14px;
    padding: 20px;
    margin: 10px 0;
}
.btn {
    padding: 15px 30px;
    border-radius: 20px;
    border: 2px solid #3dffa0;
    background: rgba(61,255,160,.1);
    color: #3dffa0;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
}
.btn:hover {
    background: rgba(61,255,160,.2);
}
.status {
    padding: 10px;
    border-radius: 8px;
    margin: 10px 0;
}
.success { background: rgba(61,255,160,.1); border: 1px solid #3dffa0; color: #3dffa0; }
.error { background: rgba(255,94,107,.1); border: 1px solid #ff5e6b; color: #ff5e6b; }
.info { background: rgba(255,185,70,.1); border: 1px solid #ffb946; color: #ffb946; }
</style>
</head>
<body>

<div class="test-box">
    <h1>🔧 Diagnóstico de Conexão</h1>
    <div id="status" class="status info">Sistema iniciado - Pronto para testar</div>
    
    <button class="btn" onclick="testarConexao()">🔌 TESTAR CONEXÃO</button>
    <button class="btn" onclick="gerarDadosSimulados()">📊 GERAR DADOS SIMULADOS</button>
    <button class="btn" onclick="iniciarSistema()" style="border-color: #ffb946; color: #ffb946;">⚡ INICIAR SISTEMA COMPLETO</button>
    
    <div id="log" style="margin-top: 20px; font-size: 12px;"></div>
</div>

<script>
// Função de log
function addLog(mensagem, tipo) {
    const logDiv = document.getElementById('log');
    const cor = tipo === 'success' ? '#3dffa0' : tipo === 'error' ? '#ff5e6b' : '#ffb946';
    logDiv.innerHTML += `<div style="color: ${cor}; margin: 5px 0;">[${new Date().toLocaleTimeString()}] ${mensagem}</div>`;
    
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = mensagem;
    statusDiv.className = 'status ' + tipo;
}

// Teste 1: Verificar se JavaScript está funcionando
addLog('✅ JavaScript está funcionando!', 'success');

// Teste 2: Verificar localStorage
try {
    localStorage.setItem('teste', 'funcionando');
    const valor = localStorage.getItem('teste');
    if (valor === 'funcionando') {
        addLog('✅ localStorage funcionando!', 'success');
    }
} catch(e) {
    addLog('❌ Erro no localStorage: ' + e.message, 'error');
}

// Teste 3: Função de conexão
function testarConexao() {
    addLog('🔍 Iniciando teste de conexão...', 'info');
    
    // Gerar dados simulados simples
    const dados = [];
    let preco = 2650;
    
    for (let i = 0; i < 50; i++) {
        preco += (Math.random() - 0.5) * 2;
        dados.push({
            open: preco,
            high: preco + Math.random() * 1,
            low: preco - Math.random() * 1,
            close: preco + (Math.random() - 0.5) * 1
        });
    }
    
    addLog(`✅ ${dados.length} velas geradas com sucesso!`, 'success');
    addLog(`📈 Último preço: $${dados[dados.length-1].close.toFixed(2)}`, 'info');
    
    // Calcular médias simples
    const precos = dados.map(d => d.close);
    const media = precos.reduce((a, b) => a + b) / precos.length;
    
    addLog(`📊 Preço médio: $${media.toFixed(2)}`, 'info');
    addLog('✅ Sistema de cálculo funcionando!', 'success');
}

// Teste 4: Gerar dados simulados completos
function gerarDadosSimulados() {
    addLog('🔄 Gerando dados simulados completos...', 'info');
    
    try {
        const candles = [];
        let preco = 2650;
        
        for (let i = 0; i < 100; i++) {
            const timestamp = Date.now() - (100 - i) * 300000; // 5min cada
            const volatilidade = preco * 0.0005;
            const variacao = (Math.random() - 0.5) * volatilidade * 2;
            
            const open = preco;
            const close = open + variacao;
            const high = Math.max(open, close) + Math.abs(variacao) * Math.random();
            const low = Math.min(open, close) - Math.abs(variacao) * Math.random();
            
            candles.push({
                ts: timestamp,
                open: open,
                high: high,
                low: low,
                close: close,
                vol: Math.floor(Math.random() * 1000 + 100)
            });
            
            preco = close;
        }
        
        addLog(`✅ ${candles.length} velas completas geradas!`, 'success');
        
        // Mostrar análise básica
        const ultima = candles[candles.length - 1];
        const penultima = candles[candles.length - 2];
        const variacao = ((ultima.close - penultima.close) / penultima.close * 100);
        
        addLog(`📈 Último: $${ultima.close.toFixed(2)} | Variação: ${variacao.toFixed(2)}%`, 'info');
        addLog(`📊 Máx: $${ultima.high.toFixed(2)} | Mín: $${ultima.low.toFixed(2)}`, 'info');
        
        // Análise simples de tendência
        const primeiras20 = candles.slice(0, 20);
        const ultimas20 = candles.slice(-20);
        const mediaInicio = primeiras20.reduce((a, b) => a + b.close, 0) / 20;
        const mediaFim = ultimas20.reduce((a, b) => a + b.close, 0) / 20;
        const tendencia = mediaFim > mediaInicio ? 'ALTA 📈' : 'BAIXA 📉';
        
        addLog(`🎯 Tendência: ${tendencia}`, mediaFim > mediaInicio ? 'success' : 'error');
        
    } catch(e) {
        addLog('❌ Erro ao gerar dados: ' + e.message, 'error');
    }
}

// Teste 5: Sistema completo simplificado
function iniciarSistema() {
    addLog('⚡ Iniciando sistema completo...', 'info');
    
    // Simular conexão
    addLog('🔌 Conectando ao sistema de sinais...', 'info');
    
    setTimeout(() => {
        addLog('✅ Conectado com sucesso!', 'success');
        
        // Simular primeira análise
        const sinal = Math.random() > 0.6 ? 'COMPRA ▲' : Math.random() > 0.5 ? 'VENDA ▼' : 'ESPERAR';
        const confianca = Math.floor(Math.random() * 30 + 65);
        
        addLog(`🎯 Sinal gerado: ${sinal} (${confianca}% de confiança)`, 'success');
        addLog('💎 Sistema funcionando perfeitamente!', 'success');
        addLog('📊 Créditos: 100 | Custo por atualização: 1 crédito', 'info');
    }, 1000);
}

// Auto-teste ao carregar
window.onload = function() {
    setTimeout(() => {
        addLog('🔍 Executando teste automático...', 'info');
        testarConexao();
    }, 500);
};
</script>

</body>
</html>
